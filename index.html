<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Expense &amp; Budget Visualizer</title>
    <link rel="stylesheet" href="css/style.css" />
  </head>
  <body>
    <header class="app-header">
      <h1 class="app-title">Expense &amp; Budget Visualizer</h1>
      <button
        id="theme-toggle"
        class="theme-toggle"
        aria-label="Switch to dark mode"
        title="Toggle dark mode"
      >
        <span class="theme-toggle__icon" aria-hidden="true">🌙</span>
        <span class="theme-toggle__label">Dark</span>
      </button>
    </header>
    <main>
      <section id="balance-display" aria-label="Total Balance">
        <h1>Total Balance: <span id="balance-amount">$0.00</span></h1>
      </section>

      <form id="input-form" novalidate>
        <h2>Add Transaction</h2>

        <div class="form-group">
          <label for="item-name">Item Name</label>
          <input
            type="text"
            id="item-name"
            name="item-name"
            placeholder="e.g. Coffee"
            autocomplete="off"
          />
          <span id="name-error" class="field-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="item-amount">Amount ($)</label>
          <input
            type="number"
            id="item-amount"
            name="item-amount"
            placeholder="e.g. 4.50"
            min="0.01"
            max="999999999.99"
            step="0.01"
          />
          <span id="amount-error" class="field-error" aria-live="polite"></span>
        </div>

        <div class="form-group">
          <label for="item-category">Category</label>
          <select id="item-category" name="item-category">
            <option value="">-- Select a category --</option>
            <option value="Food">Food</option>
            <option value="Transport">Transport</option>
            <option value="Fun">Fun</option>
          </select>
          <span id="category-error" class="field-error" aria-live="polite"></span>
        </div>

        <button type="submit">Add Transaction</button>
      </form>

      <section id="transaction-list-section" aria-label="Transaction List">
        <h2>Transactions</h2>
        <ul id="transaction-list" aria-live="polite"></ul>
        <p id="transaction-list-empty">No transactions recorded yet.</p>
      </section>

      <section id="chart-section" aria-label="Spending Distribution Chart">
        <h2>Spending by Category</h2>
        <canvas id="spending-chart" aria-label="Pie chart of spending by category" role="img"></canvas>
        <p id="chart-empty">No transactions yet — add an expense to see your spending chart.</p>
      </section>
    </main>

    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
    <script src="js/app.js"></script>
  </body>
</html>
